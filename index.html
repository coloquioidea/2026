    const img = new Image();
    const reader = new FileReader();
    reader.onload = (ev) => {
      img.onload = () => {
        const canvas = document.createElement("canvas");
        const MAX = 800;
        let w = img.width, h = img.height;
        if (w > MAX) { h = h * MAX / w; w = MAX; }
        if (h > MAX) { w = w * MAX / h; h = MAX; }
        canvas.width = w; canvas.height = h;

              { bloque: "Arte, estética y cultura visual", color: "#f5d86e", items: [
                { t: "3:00", n: "Christian Manuel Camacho Reynoso", p: "Pinturas de mosaicos — frontalidad, pulverización e ícono", d: "Diseño y Arte", l: ["est","tec"] },
                { t: "3:15", n: "Mihaela Luminita Albisoru", p: "Cartografías de la amistad: restitución del afecto a través del arte", d: "Diseño y Arte", l: ["est","tec"] },
                { t: "3:30", n: "Sergio Trujillo Pérez", p: "Belleza extrema: estética, transgresión y simbolismo en los logotipos del metal", d: "Diseño y Arte", l: ["est","sos"] },
                { t: "3:45", n: "Andrea P. Leal Montemayor", p: "Paula Cortazar en Museo Marco", d: "Diseño y Arte", l: ["est","sos"] },
              ]},
              { bloque: "Preguntas y diálogo · Bloque 4", special: true, t: "4:00" },
              { bloque: "Receso", special: true, t: "4:10" },
              { bloque: "Pedagogía, comunidad y medios", color: "#e8c6cf", items: [
                { t: "4:20", n: "Miroslava Nadkova Petrova", p: "Sesgos de la IA y su impacto en la narrativa cultural", d: "Diseño y Arte", l: ["ens","tec"] },
                { t: "4:35", n: "Ma. Fernanda Márquez Culebra", p: "Pedagogías con Perspectiva de Género", d: "Diseño y Arte", l: ["sos","ens"] },
                { t: "4:50", n: "Christopher Mark Lange", p: "Who Responded to the Monopoly of Their Day?", d: "Diseño y Arte", l: ["ens","tec"] },
                { t: "5:05", n: "Iliana María Moreno Guzmán", p: "Un episodio a la vez: cómo un podcast expande la comunidad del diseño", d: "Diseño y Arte", l: ["ens","tec"] },
              ]},
              { bloque: "Preguntas y diálogo · Bloque 5", special: true, t: "5:20" },
              { bloque: "Narrativa y diseño", color: "#e8c6cf", items: [
                { t: "5:30", n: "Indira Sánchez Tapia", p: "El museo como espacio de formación de la mirada", d: "Diseño y Arte", l: ["ens","est"] },
                { t: "5:42", n: "Diana Sofía Chapa Chapa", p: "Articulación Semiótica y Narrativa en el Diseño de Videojuegos", d: "Diseño y Multimedia", l: ["sos","tec"] },
              ]},
              { bloque: "Preguntas y diálogo · Bloque 6 + Entrega de diplomas + Cierre del coloquio", special: true, t: "5:54" },
            ]},
          ].filter(day => agendaDay === "todos" || agendaDay === day.id).map((day, di) => (
            <div key={di} style={{ marginBottom: 56 }}>
              <div style={{ padding: "16px 0 12px", borderBottom: "2px solid #111", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                <div>
                  <p style={{ fontSize: 13, fontWeight: 700, letterSpacing: 3, textTransform: "uppercase", color: "#111" }}>{day.title}</p>
                  <p style={{ fontSize: 12, color: "#888", marginTop: 4 }}>{day.fecha}</p>
                </div>
                <a href={day.cal} target="_blank" rel="noopener" style={{ display: "inline-flex", alignItems: "center", gap: 6, padding: "8px 16px", borderRadius: 20, fontSize: 11, fontWeight: 700, color: "#111", background: "#f0f0f0", textDecoration: "none" }}>
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#111" strokeWidth="2" strokeLinecap="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                  Agendar todo el día
                </a>
              </div>
              {day.bloques.map((b, bi) => (
                b.special ? (
                  <div key={bi} style={{ display: "flex", padding: "12px 0", margin: "4px 0", background: "#f8f8f8", borderRadius: 6 }}>
                    <span style={{ minWidth: 90, fontSize: 13, fontWeight: 700, color: "#555", paddingLeft: 0 }}>{b.t} p.m.</span>
                    <span style={{ fontSize: 13, fontWeight: 600, color: "#888" }}>{b.bloque}</span>
                  </div>
                ) : (
                  <div key={bi}>
                    <div style={{ display: "inline-flex", alignItems: "center", gap: 10, padding: "10px 20px", marginTop: 20, marginBottom: 8, background: b.color, borderRadius: 24 }}>
                      <div style={{ width: 10, height: 10, borderRadius: 5, background: "rgba(0,0,0,0.2)" }} />
                      <span style={{ fontSize: 13, fontWeight: 800, letterSpacing: 1, textTransform: "uppercase", color: "rgba(0,0,0,0.7)" }}>{b.bloque}</span>
                    </div>
                    {b.items.map((item, ii) => (
                      <div key={ii} style={{ display: "flex", padding: "14px 0", borderBottom: "1px solid #f0f0f0" }}>
                        <span style={{ minWidth: 90, fontSize: 13, fontWeight: 700, color: "#555" }}>{item.t} p.m.</span>
                        <div style={{ flex: 1 }}>
                          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
                            <p style={{ fontSize: 15, fontWeight: 700, marginBottom: 3, lineHeight: 1.3, flex: 1 }}>{item.p}</p>
                            <a href={(() => { var h = parseInt(item.t.split(":")[0]) + 18; var m = parseInt(item.t.split(":")[1]); var eh = h; var em = m + 12; if (em >= 60) { eh++; em -= 60; } var ds = day.dayDate + "T" + String(h).padStart(2,"0") + String(m).padStart(2,"0") + "00Z"; var de = day.dayDate + "T" + String(eh).padStart(2,"0") + String(em).padStart(2,"0") + "00Z"; return "https://calendar.google.com/calendar/render?action=TEMPLATE&text=" + encodeURIComponent(item.p + " — " + item.n) + "&dates=" + ds + "/" + de + "&details=" + encodeURIComponent("Coloquio +IDEA 2026\n" + item.n + "\nSala Polivalente, 4o piso del CRGS, UDEM") + "&location=" + encodeURIComponent("Sala Polivalente, 4o piso del CRGS, UDEM"); })()} target="_blank" rel="noopener" style={{ marginLeft: 8, flexShrink: 0, display: "inline-flex", alignItems: "center", padding: "6px 12px", borderRadius: 20, fontSize: 10, color: "#555", background: "#f0f0f0", border: "none", textDecoration: "none", gap: 5, fontWeight: 600 }} title="Agregar a Google Calendar">
                              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>Agendar ponencia
                            </a>
                          </div>
                          <p style={{ fontSize: 13, color: "#666", marginBottom: 6 }}>{item.n}{item.d ? " · Dpto. " + item.d : ""}</p>
                          {item.l && <div style={{ display: "flex", gap: 4, flexWrap: "wrap" }}>{item.l.map((tag, ti) => { var lm = {"tec":["Tecnología y técnica","#c2d4cc","#3d5c4e"],"sos":["Sostenibilidad y sociedad","#d6e8c8","#3b6d11"],"est":["Estética y apreciación","#f5d86e","#6b5a0e"],"ens":["Enseñanza del arte y diseño","#e8c6cf","#72243e"]}; var info = lm[tag] || ["","#eee","#999"]; return <span key={ti} style={{ display: "inline-block", padding: "2px 8px", fontSize: 9, fontWeight: 600, borderRadius: 10, background: info[1], color: info[2] }}>{info[0]}</span>; })}</div>}
                        </div>
                      </div>
                    ))}
                  </div>
                )
              ))}
            </div>
          ))}
          <p style={{ fontSize: 12, color: "#aaa", textAlign: "center", marginTop: 32, lineHeight: 1.7 }}>Sujeto a cambios por modificaciones en agenda / ponencias.</p>
        </div>
      )}

      {/* INDICACIONES */}
      {view === "ponentes" && (
        <div style={{ maxWidth: 700, margin: "0 auto", padding: "64px 0" }}>
          <p style={{ fontFamily: f, fontSize: 13, fontWeight: 700, letterSpacing: 3, textTransform: "uppercase", color: "#111", marginBottom: 8 }}>+IDEA 2026</p>
          <h2 style={{ fontFamily: f, fontSize: 48, fontWeight: 800, color: "#111", letterSpacing: -2, marginBottom: 48 }}>Indicaciones para ponentes</h2>

          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 20, marginBottom: 48 }}>
            <div style={{ borderLeft: "3px solid #c2d4cc", paddingLeft: 16 }}>
              <p style={{ fontSize: 14, fontWeight: 700, color: "#111", marginBottom: 4 }}>Presentación</p>
              <p style={{ fontSize: 13, color: "#666", lineHeight: 1.7 }}>Cada ponente dispone de <b>8 minutos</b> para su presentación. Estructura sugerida: contexto (2 min), desarrollo (4 min) y hallazgos o reflexiones (2 min).</p>
            </div>
            <div style={{ borderLeft: "3px solid #d6e8c8", paddingLeft: 16 }}>
              <p style={{ fontSize: 14, fontWeight: 700, color: "#111", marginBottom: 4 }}>Preguntas</p>
              <p style={{ fontSize: 13, color: "#666", lineHeight: 1.7 }}>Las preguntas se realizan <b>por bloque temático</b>. Al terminar cada bloque de 3–4 ponencias habrá <b>10 minutos de diálogo grupal</b>.</p>
            </div>
            <div style={{ borderLeft: "3px solid #f5d86e", paddingLeft: 16 }}>
              <p style={{ fontSize: 14, fontWeight: 700, color: "#111", marginBottom: 4 }}>Formato de slides</p>
              <p style={{ fontSize: 13, color: "#666", lineHeight: 1.7 }}>Formato <b>16:9</b>. Archivo en PDF o PowerPoint. Enviar presentación final antes del <b>viernes 18 de julio</b> (recomendable, se puede subir hasta el día del coloquio).</p>
              <a href="https://coloquioidea.github.io/2026/Template_IDEA.pptx" download style={{ display: "inline-flex", alignItems: "center", gap: 8, marginTop: 10, padding: "8px 16px", borderRadius: 20, fontSize: 12, fontWeight: 700, color: "#111", background: "#f5d86e", textDecoration: "none" }}>
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#111" strokeWidth="2" strokeLinecap="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                Descargar template de portada (.pptx)
              </a>
              <p style={{ fontSize: 11, color: "#999", marginTop: 6 }}>Usa esta portada, el resto del diseño es libre.</p>
            </div>
            <div style={{ borderLeft: "3px solid #e8c6cf", paddingLeft: 16 }}>
              <p style={{ fontSize: 14, fontWeight: 700, color: "#111", marginBottom: 4 }}>Día del evento</p>
              <p style={{ fontSize: 13, color: "#666", lineHeight: 1.7 }}>Llegar <b>15 minutos antes</b> del inicio de tu bloque. Se proyectará un <b>timer visible</b> durante cada ponencia.</p>
            </div>
          </div>

          <div style={{ background: "#111", color: "#fff", padding: 32, borderRadius: 8 }}>
            <p style={{ fontSize: 20, fontWeight: 800, marginBottom: 16 }}>Envía tu presentación</p>
            <p style={{ fontSize: 13, color: "#888", lineHeight: 1.7, marginBottom: 24 }}>Sube tu archivo (PDF o PPT, máximo 10 MB) o comparte un enlace. Fecha recomendada: <b style={{ color: "#fff" }}>viernes 18 de julio</b> (puedes subir hasta el día del coloquio).</p>
            {!submitted ? (
              <div>
                <input value={subEmail} onChange={e => setSubEmail(e.target.value)} placeholder="Tu correo UDEM" style={{ width: "100%", padding: 14, fontSize: 15, border: "1px solid #333", background: "#222", color: "#fff", outline: "none", borderRadius: 8, marginBottom: 12, fontFamily: fb }} />
                <p style={{ fontSize: 12, color: "#666", marginBottom: 8 }}>Opción 1: Comparte un enlace</p>
                <input value={subLink} onChange={e => setSubLink(e.target.value)} placeholder="Enlace (Google Drive, Dropbox, etc.)" style={{ width: "100%", padding: 14, fontSize: 15, border: "1px solid #333", background: "#222", color: "#fff", outline: "none", borderRadius: 8, marginBottom: 16, fontFamily: fb }} />
                <p style={{ fontSize: 12, color: "#666", marginBottom: 8 }}>Opción 2: Sube tu archivo</p>
                <label style={{ display: "block", border: "1px dashed #444", padding: 20, textAlign: "center", borderRadius: 8, cursor: "pointer", marginBottom: 16 }}>
                  <input type="file" accept=".pdf,.ppt,.pptx" multiple style={{ display: "none" }} ref={fileRef} onChange={e => { if (e.target.files.length > 0) { var names = []; for (var i=0; i<e.target.files.length; i++) names.push(e.target.files[i].name); setSubFileName(names.join(", ") + " (" + e.target.files.length + " archivo" + (e.target.files.length>1?"s":"") + ")"); } }} />
                  <span style={{ fontSize: 13, color: "#888" }}>{subFileName || "Click para subir PPT o PDF (recomendable) — máx. 25 MB"}</span>
                </label>
                <button onClick={() => {
                  if (!subEmail) { setMsg("Ingresa tu correo"); return; }
                  var files = fileRef.current && fileRef.current.files; var file = files && files.length > 0 ? files[0] : null;
                  if (!subLink && !file) { setMsg("Comparte un enlace o sube un archivo"); return; }
                  var totalSize = 0; if (files) { for (var fi=0; fi<files.length; fi++) totalSize += files[fi].size; } if (totalSize > 25 * 1024 * 1024) { setMsg("El archivo excede 25 MB"); return; }
                  setSubmitting2(true); setMsg("Subiendo...");
                  if (file) {
                    var reader = new FileReader();
                    reader.onload = function() {
                      var base64 = reader.result.split(",")[1];
                      fetch(SHEET_URL, { method: "POST", body: JSON.stringify({ tipo: "submission", correo: subEmail, link: subLink, archivo: base64, nombreArchivo: file.name, fecha: new Date().toISOString() }) })
                        .then(r => r.json()).then(d => { if (d.status === "ok") { setSubmitted(true); setMsg("¡Recibido! Gracias, " + (d.nombre || "") + "."); } else { setMsg("Correo no encontrado. Verifica e intenta de nuevo."); setSubmitting2(false); } })
                        .catch(() => { setMsg("Error de conexión. Intenta de nuevo."); setSubmitting2(false); });
                    };
                    reader.readAsDataURL(file);
                  } else {
                    fetch(SHEET_URL, { method: "POST", body: JSON.stringify({ tipo: "submission", correo: subEmail, link: subLink, archivo: "", nombreArchivo: "", fecha: new Date().toISOString() }) })
                      .then(r => r.json()).then(d => { if (d.status === "ok") { setSubmitted(true); setMsg("¡Recibido! Gracias, " + (d.nombre || "") + "."); } else { setMsg("Correo no encontrado. Verifica e intenta de nuevo."); setSubmitting2(false); } })
                      .catch(() => { setMsg("Error de conexión"); setSubmitting2(false); });
                  }
                }} disabled={submitting2} style={{ width: "100%", padding: 16, background: "#fff", color: "#111", border: "none", fontSize: 14, fontWeight: 700, cursor: submitting2 ? "wait" : "pointer", borderRadius: 32, letterSpacing: 1, textTransform: "uppercase" }}>{submitting2 ? "Subiendo..." : "Enviar presentación"}</button>
                {msg && <p style={{ marginTop: 12, fontSize: 13, color: "#f5d86e", textAlign: "center" }}>{msg}</p>}
              </div>
            ) : (
              <div style={{ textAlign: "center", padding: 24 }}>
                <p style={{ fontSize: 24, fontWeight: 800, marginBottom: 8 }}>¡Recibido!</p>
                <p style={{ fontSize: 14, color: "#888" }}>{msg}</p>
              </div>
            )}
            <p style={{ fontSize: 13, color: "#888", marginTop: 16, lineHeight: 1.7 }}>También puedes enviar tu presentación (PPT) directamente a Mafer: <a href="mailto:fernanda.marquez@udem.edu" style={{ color: "#fff", fontWeight: 700 }}>fernanda.marquez@udem.edu</a></p>
          </div>
        </div>
      )}

      {/* LIST */}
      {view === "list" && !detail && (
        <div style={{ padding: "64px 0" }}>
          <p style={{ fontFamily: f, fontSize: 13, fontWeight: 700, letterSpacing: 3, textTransform: "uppercase", color: "#111", marginBottom: 8 }}>Comunidad</p>
          <h2 style={{ fontFamily: f, fontSize: 48, fontWeight: 800, color: "#111", letterSpacing: -2, marginBottom: 6 }}>Participantes</h2>
          <p style={{ fontSize: 12, color: "#ccc", letterSpacing: 1, marginBottom: 40 }}>{participants.length} ponente{participants.length !== 1 ? "s" : ""} · {oyentes.length} oyente{oyentes.length !== 1 ? "s" : ""}</p>

          {participants.length > 0 && (
            <>
              <p style={{ fontSize: 11, fontWeight: 700, letterSpacing: 3, textTransform: "uppercase", color: "#111", marginBottom: 16, display: "flex", alignItems: "center", gap: 8 }}>
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#111" strokeWidth="2.5" strokeLinecap="round"><path d="M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3z"/><path d="M19 10v2a7 7 0 01-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/></svg>
                Ponentes
              </p>
              <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(320px, 1fr))", gap: 1, background: "#eee", marginBottom: 56 }}>
                {participants.map(p => (
                  <div key={p.id} onClick={() => setDetail(p)} style={{
                    background: "#fff", padding: "28px 24px", cursor: "pointer",
                    transition: "background .15s",
                  }}
                    onMouseEnter={e => e.currentTarget.style.background = "#fafafa"}
                    onMouseLeave={e => e.currentTarget.style.background = "#fff"}
                  >
                    <div style={{ display: "flex", alignItems: "center", gap: 14, marginBottom: 14 }}>
                      {p.foto && getDriveThumb(p.foto) ? <img src={getDriveThumb(p.foto)} style={{ width: 48, height: 48, objectFit: "cover" }} /> : (
                        <div style={{ width: 48, height: 48, background: "#f5f5f5", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 18, color: "#ccc", fontWeight: 700 }}>{p.nombre.charAt(0)}</div>
                      )}
                      <div>
                        <div style={{ fontFamily: f, fontWeight: 700, fontSize: 16, color: "#111" }}>{p.nombre}</div>
                        <div style={{ fontSize: 11, color: "#bbb" }}>{p.correo}</div>
                      </div>
                    </div>
                    <div style={{ fontSize: 13, fontWeight: 600, color: "#444", marginBottom: 10 }}>{p.titulo}</div>
                    <div style={{ display: "flex", flexWrap: "wrap", gap: 4 }}>
                      {getLineas(p).map((lid, i) => { const l = LINEAS.find(x => x.id === lid); return l ? <span key={lid} style={{ background: l.color, padding: "3px 10px", fontSize: 10, fontWeight: 700, color: "#333", letterSpacing: 0.5 }}>{String.fromCharCode(65+i)}. {l.label}</span> : null; })}
                    </div>
                  </div>
                ))}
              </div>
            </>
          )}


          {oyentes.length > 0 && (
            <>
              <p style={{ fontSize: 11, fontWeight: 700, letterSpacing: 3, textTransform: "uppercase", color: "#111", marginBottom: 16, display: "flex", alignItems: "center", gap: 8 }}>
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#111" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M6 8.5a6.5 6.5 0 1113 0c0 6-6 5.5-6 11.5"/><path d="M6 20a2 2 0 104 0"/></svg>
                Oyentes
              </p>
              <div style={{ display: "flex", flexWrap: "wrap", gap: 8, marginBottom: 56 }}>
                {oyentes.map(o => (
                  <span key={o.id} style={{ background: "#f8f8f8", padding: "8px 16px", fontSize: 13, fontWeight: 600, color: "#444" }}>{o.nombre}</span>
                ))}
              </div>
            </>
          )}

          {participants.length === 0 && oyentes.length === 0 && (
            <div style={{ textAlign: "center", padding: 80 }}>
              <p style={{ fontSize: 14, color: "#ccc" }}>Aún no hay registros.</p>
              <button onClick={() => setView("form")} style={{ marginTop: 16, background: "#111", color: "#fff", border: "none", padding: "12px 28px", fontSize: 12, cursor: "pointer", fontWeight: 600, letterSpacing: 2, textTransform: "uppercase" }}>Registrar al primero</button>
            </div>
          )}
        </div>
      )}

      {/* DETAIL */}
      {view === "list" && detail && (
        <div style={{ maxWidth: 600, margin: "0 auto", padding: "64px 0" }}>
          <button onClick={() => setDetail(null)} style={{ background: "none", border: "none", fontSize: 12, color: "#bbb", cursor: "pointer", marginBottom: 32, fontWeight: 500, letterSpacing: 1 }}>← VOLVER</button>
          <div>
            <div style={{ display: "flex", alignItems: "center", gap: 20, marginBottom: 32 }}>
              {detail.foto && getDriveThumb(detail.foto) ? <img src={getDriveThumb(detail.foto)} style={{ width: 96, height: 96, objectFit: "cover" }} /> : (
                <div style={{ width: 96, height: 96, background: "#f5f5f5", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 36, color: "#ccc", fontWeight: 700 }}>{detail.nombre.charAt(0)}</div>
              )}
              <div>
                <h3 style={{ fontFamily: f, fontSize: 32, fontWeight: 800, color: "#111", letterSpacing: -1 }}>{detail.nombre}</h3>
                <p style={{ fontSize: 13, color: "#bbb" }}>{detail.correo}</p>
              </div>
            </div>
            <div style={{ display: "flex", flexWrap: "wrap", gap: 6, marginBottom: 28 }}>
              {getLineas(detail).map((lid, i) => { const l = LINEAS.find(x => x.id === lid); return l ? <span key={lid} style={{ background: l.color, padding: "4px 14px", fontSize: 11, fontWeight: 700, color: "#333", letterSpacing: 0.5 }}>{String.fromCharCode(65+i)}. {l.label}</span> : null; })}
            </div>
            <h4 style={{ fontFamily: f, fontSize: 22, fontWeight: 700, color: "#111", marginBottom: 12 }}>{detail.titulo}</h4>
            {detail.semblanza && <>
              <p style={{ fontSize: 11, fontWeight: 700, letterSpacing: 3, textTransform: "uppercase", color: "#111", marginBottom: 8 }}>Semblanza</p>
              <p style={{ fontSize: 14, color: "#666", lineHeight: 1.8 }}>{detail.semblanza}</p>
            </>}
          </div>
        </div>
      )}

      </div>
      <style>{`@keyframes fadeS{from{opacity:0;transform:translateX(-50%) translateY(-8px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}::selection{background:#f5d86e;color:#111}`}</style>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
